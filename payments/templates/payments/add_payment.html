<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Add Payment</title>
</head>
<body>
  <h1>Add Payment</h1>
  <form method="post">
    {% csrf_token %}
    <label>Name:</label>
    <input type="text" name="name" /><br/>
    <label>Amount:</label>
    <input type="number" step="0.01" name="amount" /><br/>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
